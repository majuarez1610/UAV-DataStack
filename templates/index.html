<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>UAV DataStack Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}" />
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>
<body>
  <div id="container">
    <aside id="sidebar">
      <header class="sidebar-header">
        <h1>UAV DataStack</h1>
        <div id="status-badges">
          <span id="badge-conn" class="status-badge waiting">Desconectado</span>
          <span id="badge-mission" class="status-badge waiting">Misión: Inactiva</span>
        </div>
      </header>

      <section class="card">
        <h3>Video</h3>
        <div id="video-panel">
          <img id="videoFeed" src="" alt="Video Feed" />
          <div id="video-placeholder" class="hidden">Cámara no disponible</div>
        </div>
      </section>

      <section class="card">
        <h3>Métricas</h3>
        <div class="data-grid">
          <div>Altitud<br><span class="data" id="alt-val">0</span></div>
          <div>Modo<br><span class="data" id="modo-val">---</span></div>
          <div>Voltaje<br><span class="data" id="volt-val">0</span></div>
          <div>Corriente<br><span class="data" id="current-val">0</span></div>
        </div>
        <div class="chart-container">
          <canvas id="batteryChart"></canvas>
        </div>
      </section>

      <section class="card">
        <h3>Controles</h3>
        <div class="control-grid">
          <button id="btn-arm" class="btn danger" disabled>ARM</button>
          <button id="btn-disarm" class="btn" disabled>DISARM</button>
          <button id="btn-stabilize" class="btn" disabled>STABILIZE</button>
          <button id="btn-auto" class="btn" disabled>AUTO</button>
          <button id="btn-land" class="btn" disabled>LAND</button>
          <button id="btn-mission-start" class="btn accent" disabled>MISSION START</button>
        </div>
        <div id="app-message" class="small">Inicia sesión para habilitar controles</div>
      </section>

      <div id="login-modal" class="modal hidden">
        <div class="modal-content">
          <h3>Autenticación</h3>
          <input id="login-user" placeholder="Usuario" />
          <input id="login-pass" type="password" placeholder="Contraseña" />
          <div id="login-message" class="small"></div>
          <div class="modal-actions">
            <button id="login-submit" class="btn">Login</button>
            <button id="login-cancel" class="btn">Cancelar</button>
          </div>
        </div>
      </div>
    </aside>

    <main id="main">
      <div id="map" class="map"></div>
    </main>
  </div>

  <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>
